<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzay Temalı Hiyerarşi: Altın & Gümüş Çerçeveler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
  --accent: #3b82f6;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --border: #334155;
}
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 20px;
  line-height: 1.6;
}
.container { max-width: 1200px; margin: auto; padding: 20px; }
header { background: linear-gradient(135deg, var(--accent), #1d4ed8); padding: 40px; border-radius: 16px; color: white; text-align: center; margin-bottom: 40px; }
h1, h2, h3 { margin-top: 0; }
h1 { font-size: 2.5rem; margin-bottom: 10px; }
h2 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin: 15px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.btn {
  display: inline-block;
  background: var(--accent);
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  border: none;
  cursor: pointer;
}
.btn:hover { opacity: 0.9; }
.table { width: 100%; border-collapse: collapse; margin: 20px 0; }
.table th, .table td { border: 1px solid var(--border); padding: 12px; text-align: left; }
.table th { background: rgba(255,255,255,0.05); font-weight: 600; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; color: #94a3b8; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  color: var(--text);
  box-sizing: border-box;
}
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
  header { padding: 20px; }
  h1 { font-size: 1.8rem; }
}
footer { text-align: center; margin-top: 50px; color: #64748b; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
<header>
<h1>Uzay Temalı Hiyerarşi: Altın & Gümüş Çerçeveler</h1>
<p>Modern, responsive, dark-mode UI – Cooder Designer</p>
</header>

<section class="card">
<h2>🎯 Örnek Component'ler</h2>
<div class="grid">
<div class="card">
<h3>🔘 Butonlar</h3>
<button class="btn">Ana Buton</button>
<button class="btn" style="background:var(--success)">Başarı</button>
<button class="btn" style="background:var(--danger)">Tehlike</button>
</div>
<div class="card">
<h3>📋 Form</h3>
<form class="form-group">
<label>Adınız</label>
<input type="text" placeholder="Adınız...">
<label>E-posta</label>
<input type="email" placeholder="ornek@email.com">
<button class="btn">Gönder</button>
</form>
</div>
<div class="card">
<h3>📊 Tablo</h3>
<table class="table">
<thead><tr><th>ID</th><th>İsim</th><th>Durum</th></tr></thead>
<tbody>
<tr><td>1</td><td>Test</td><td>Aktif</td></tr>
<tr><td>2</td><td>Demo</td><td>Pasif</td></tr>
</tbody>
</table>
</div>
</div>
</section>

<footer>
<small>Generated by Cooder Designer • OpenClaw Ecosystem</small>
</footer>
</div>
</body>
</html>
