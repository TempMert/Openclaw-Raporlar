<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OpenClaw Hiyerarşisi</title>
<style>
body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { text-align: center; max-width: 600px; }
h1 { color: #3b82f6; margin-bottom: 30px; }
.hierarchy { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.node { background: #1e293b; padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-width: 200px; }
.node-name { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
.node-role { color: #94a3b8; font-size: 0.95rem; }
.connector { font-size: 2.5rem; color: #64748b; line-height: 1; margin: 5px 0; }
footer { margin-top: 40px; color: #64748b; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="container">
<h1>🏢 OpenClaw Hiyerarşisi</h1>
<div class="hierarchy">
<div class="node">
<div class="node-name">👑 Mertko</div>
<div class="node-role">CEO / Owner</div>
</div>
<div class="connector">↓</div>
<div class="node">
<div class="node-name">🦀 Claw</div>
<div class="node-role">Chief Assistant Agent</div>
</div>
<div class="connector">↓</div>
<div class="node">
<div class="node-name">🛡️ Securi</div>
<div class="node-role">Security Agent</div>
</div>
</div>
<footer>
Bu hiyerarşi OpenClaw sisteminde geçerlidir.<br>
<small>Generated on 2026-03-01</small>
</footer>
</div>
</body>
</html>
