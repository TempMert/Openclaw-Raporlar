<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>OpenClaw Hiyerarşisi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --space-bg: #0b0d17;
  --gold: #FFD700;
  --silver: #C0C0C0;
  --blue: #3b82f6;
  --text: #ffffff;
}
body {
  margin: 0;
  padding: 20px;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, var(--space-bg), #000000);
  color: var(--text);
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(255,255,255,0.8) 0%, transparent 2%),
    radial-gradient(circle at 80% 50%, rgba(255,255,255,0.6) 0%, transparent 1.5%),
    radial-gradient(circle at 40% 70%, rgba(255,255,255,0.7) 0%, transparent 2%),
    radial-gradient(circle at 90% 10%, rgba(255,255,255,0.5) 0%, transparent 1%),
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6) 0%, transparent 1.2%);
  background-size: 400px 400px;
  opacity: 0.9;
  z-index: -1;
}
.container {
  max-width: 1200px;
  margin: auto;
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
  justify-content: center;
  align-items: center;
  padding: 60px 20px;
  position: relative;
  z-index: 1;
}
.card {
  background: rgba(30, 41, 59, 0.85);
  border: 4px solid;
  border-radius: 20px;
  padding: 35px;
  width: 320px;
  min-height: 240px;
  box-shadow: 0 0 45px;
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
  overflow: hidden;
}
.card.gold {
  border-color: var(--gold);
  box-shadow: 0 0 60px rgba(255,215,0,0.6), inset 0 0 20px rgba(255,215,0,0.15);
}
.card.silver {
  border-color: var(--silver);
  box-shadow: 0 0 60px rgba(192,192,192,0.6), inset 0 0 20px rgba(192,192,192,0.15);
}
.card.blue {
  border-color: var(--blue);
  box-shadow: 0 0 60px rgba(59,130,246,0.6), inset 0 0 20px rgba(59,130,246,0.15);
}
.card:hover {
  transform: translateY(-12px);
}
.card h2 {
  margin: 0 0 10px;
  font-size: 2rem;
}
.card .role {
  color: #94a3b8;
  font-size: 1.1rem;
}
.card .desc {
  font-size: 0.95rem;
  line-height: 1.5;
}
@media (max-width: 768px) {
  .container { flex-direction: column; }
  .card { width: 100%; max-width: 400px; }
}
</style>
</head>
<body>
<div class="container">
<div class="card gold">
  <h2>👑 Mertko</h2>
  <div class="role">CEO / Owner</div>
</div>
<div class="card silver">
  <h2>👩🏻‍💼 Claw</h2>
  <div class="role">Chief Assistant Agent (Admin)</div>
</div>
<div class="card blue">
  <h2>🛡️ Security Agent</h2>
  <div class="role">Güvenlik Sorumlusu</div>
</div>
<div class="card blue">
  <h2>👨🏾‍💻 Cooder</h2>
  <div class="role">Developer & Designer Agent</div>
</div>
</div>
</body>
</html>
