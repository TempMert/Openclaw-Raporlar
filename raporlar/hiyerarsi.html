<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>OpenClaw Hiyerarşisi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a;
  --text: #e2e8f0;
  --gold: #FFD700;
  --silver: #C0C0C0;
  --blue: #3b82f6;
}
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.hierarchy {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}
.card {
  width: 200px;
  height: 200px;
  border-radius: 12px;
  background: rgba(30, 41, 59, 0.9);
  border: 4px solid;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 10px;
  box-sizing: border-box;
}
.card.gold { border-color: var(--gold); }
.card.silver { border-color: var(--silver); }
.card.blue { border-color: var(--blue); }
.card .emoji {
  font-size: 3rem;
  margin-bottom: 10px;
}
.card .name {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 5px;
}
.card .role {
  font-size: 0.9rem;
  color: #94a3b8;
}
.connector {
  font-size: 1.5rem;
  color: #64748b;
  margin: 5px 0;
}
.subagents {
  display: flex;
  gap: 20px;
}
@media (max-width: 768px) {
  .subagents {
    flex-direction: column;
  }
}
</style>
</head>
<body>
<div class="hierarchy">
<div class="card gold">
  <div class="emoji">👑</div>
  <div class="name">Mertko</div>
  <div class="role">CEO / Owner</div>
</div>
<div class="connector">↓</div>
<div class="card silver">
  <div class="emoji">👩🏻‍💼</div>
  <div class="name">Claw</div>
  <div class="role">Chief Assistant Agent (Admin)</div>
</div>
<div class="connector">↓</div>
<div class="subagents">
<div class="card blue">
  <div class="emoji">🛡️</div>
  <div class="name">Security Agent</div>
  <div class="role">Güvenlik Sorumlusu</div>
</div>
<div class="card blue">
  <div class="emoji">👨🏾‍💻</div>
  <div class="name">Cooder</div>
  <div class="role">Developer & Designer</div>
</div>
</div>
</div>
</body>
</html>
