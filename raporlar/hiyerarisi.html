<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzay Temalı Hiyerarşi: Premium Altın & Gümüş Çerçeveler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d17;--gold:#FFD700;--silver:#C0C0C0;--blue:#3b82f6;--text:#fff}
body{margin:0;min-height:100vh;font-family:Inter,sans-serif;color:var(--text);position:relative;overflow-x:hidden;background:radial-gradient(ellipse at bottom,var(--bg),#000)}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;background-image:radial-gradient(circle at 10% 20%,rgba(255,255,255,.8) 0%,transparent 2%),radial-gradient(circle at 80% 50%,rgba(255,255,255,.6) 0%,transparent 1.5%),radial-gradient(circle at 40% 70%,rgba(255,255,255,.7) 0%,transparent 2%),radial-gradient(circle at 90% 10%,rgba(255,255,255,.5) 0%,transparent 1%),radial-gradient(circle at 30% 30%,rgba(255,255,255,.6) 0%,transparent 1.2%);background-size:400px 400px;filter:blur(1px);z-index:-1}
.container{max-width:1400px;margin:auto;display:flex;flex-wrap:wrap;gap:50px;justify-content:center;align-items:center;padding:80px 20px;position:relative;z-index:1}
.card{width:280px;min-height:260px;border-radius:28px;background:rgba(20,30,50,.75);border:6px solid;padding:40px 20px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;box-shadow:0 0 50px rgba(255,215,0,.2),inset 0 0 25px rgba(255,255,255,.05);transition:all .4s cubic-bezier(.175,.885,.32,1.275);overflow:hidden;backdrop-filter:blur(8px)}
.card.gold{border-color:var(--gold);box-shadow:0 0 60px rgba(255,215,0,.6),inset 0 0 30px rgba(255,215,0,.25)}
.card.silver{border-color:var(--silver);box-shadow:0 0 60px rgba(192,192,192,.6),inset 0 0 30px rgba(192,192,192,.25)}
.card.blue{border-color:var(--blue);box-shadow:0 0 60px rgba(59,130,246,.6),inset 0 0 30px rgba(59,130,246,.25)}
.card:hover{transform:translateY(-20px) scale(1.02)}
.card.gold:hover{box-shadow:0 0 80px rgba(255,215,0,.9),inset 0 0 35px rgba(255,215,0,.4)}
.card.silver:hover{box-shadow:0 0 80px rgba(192,192,192,.9),inset 0 0 35px rgba(192,192,192,.3)}
.card.blue:hover{box-shadow:0 0 80px rgba(59,130,246,.9),inset 0 0 35px rgba(59,130,246,.3)}
.card .emoji{font-size:4rem;margin-bottom:15px;filter:drop-shadow(0 0 10px currentColor)}
.card .name{font-size:1.6rem;font-weight:800;margin-bottom:8px;letter-spacing:.5px}
.card .role{color:#94a3b8;font-size:1.1rem;line-height:1.4}
.card:after{content:'';position:absolute;top:-100%;left:-100%;width:300%;height:300%;background:linear-gradient(rgba(255,255,255,.1) 0%,transparent 60%);transform:rotate(45deg);pointer-events:none;transition:opacity .5s;opacity:0}
.card:hover:after{opacity:1}
@media (max-width:768px){.container{flex-direction:column} .card{width:100%;max-width:360px}}
</style>
</head>
<body>
<div class="stars"></div>
<div class="container">
<div class="card gold"><div class="emoji">👑</div><div class="name">Mertko</div><div class="role">CEO / Owner</div></div>
<div class="card silver"><div class="emoji">👩🏻‍💼</div><div class="name">Claw</div><div class="role">Chief Assistant Agent (Admin)</div></div>
<div class="card blue"><div class="emoji">🛡️</div><div class="name">Security Agent</div><div class="role">Güvenlik Sorumlusu</div></div>
<div class="card blue"><div class="emoji">👨🏾‍💻</div><div class="name">Cooder</div><div class="role">Developer & Designer Agent</div></div>
</div>
</body>
</html>
